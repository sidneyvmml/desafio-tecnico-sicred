spring:
  application:
    name: votacao

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/votacao}
    username: ${DB_USERNAME:votacao}
    password: ${DB_PASSWORD:votacao}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL_SIZE:10}
      minimum-idle: ${HIKARI_MIN_IDLE:5}
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: VotacaoHikariPool

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

kafka:
  topics:
    voting-result: ${KAFKA_TOPIC_VOTING_RESULT:voting-result}

scheduler:
  session-result:
    fixed-delay-ms: ${SCHEDULER_SESSION_RESULT_DELAY_MS:30000}

  cloud:
    openfeign:
      client:
        config:
          cpf-validation:
            connect-timeout: 3000
            read-timeout: 5000
            logger-level: basic

cpf-validation:
  url: ${CPF_VALIDATION_URL:https://user-info.herokuapp.com}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
  show-actuator: false

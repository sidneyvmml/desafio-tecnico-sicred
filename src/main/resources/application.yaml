spring:
  application:
    name: votacao

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5433/votacao}
    username: ${DB_USERNAME:votacao}
    password: ${DB_PASSWORD:votacao}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  cloud:
    openfeign:
      client:
        config:
          cpf-validation:
            connect-timeout: 3000
            read-timeout: 5000
            logger-level: basic

cpf-validation:
  url: ${CPF_VALIDATION_URL:https://user-info.herokuapp.com}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    tryItOutEnabled: true
  show-actuator: false
